<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Eğitim Asistanı</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F1EB;--surface:#FDFCF8;--border:#E0DAD0;
  --ink:#1A1714;--ink2:#6A6258;--ink3:#A09488;
  --blue:#1A3A5C;--blue-l:#E8F0F8;
  --green:#1A4A2A;--green-l:#E8F4ED;
  --purple:#4A1A6A;--purple-l:#F0E8F8;
  --amber:#6A3A10;--amber-l:#F8F0E0;
  --gray:#3A3530;--gray-l:#F0EDE8;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

/* topbar */
.top{background:var(--surface);border-bottom:1px solid var(--border);height:56px;
  display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;
  position:sticky;top:0;z-index:100}
.logo{font-family:'Instrument Serif',serif;font-size:1.2rem;display:flex;align-items:center;gap:8px}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--blue)}
.top-right{display:flex;align-items:center;gap:10px}
.sync{font-size:11px;color:var(--ink3)}
.btn{font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 12px;border-radius:6px;
  cursor:pointer;border:1px solid var(--border);background:none;color:var(--ink2);transition:.15s}
.btn:hover{background:var(--blue-l);border-color:var(--blue);color:var(--blue)}

/* layout */
.layout{display:grid;grid-template-columns:210px 1fr;min-height:calc(100vh - 56px)}

/* sidebar */
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:1.25rem 0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.nav-group{margin-bottom:1.25rem}
.nav-lbl{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink3);padding:0 1rem;margin-bottom:.4rem}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 1rem;font-size:13px;
  color:var(--ink2);cursor:pointer;border-left:2px solid transparent;transition:.12s}
.nav-item:hover{background:var(--bg);color:var(--ink)}
.nav-item.active{color:var(--blue);border-left-color:var(--blue);background:var(--blue-l);font-weight:500}
.nav-icon{font-size:14px;width:16px;text-align:center}
.nav-badge{margin-left:auto;font-size:10px;font-weight:500;background:var(--blue);
  color:#fff;padding:1px 5px;border-radius:8px}

/* main */
.main{padding:1.75rem 2rem}
.page-hdr{margin-bottom:1.5rem}
.page-title{font-family:'Instrument Serif',serif;font-size:1.5rem;margin-bottom:.2rem}
.page-sub{font-size:12px;color:var(--ink3)}

/* stats */
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.75rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.9rem 1.1rem}
.stat-n{font-size:1.6rem;font-weight:300;line-height:1}
.stat-l{font-size:11px;color:var(--ink3);margin-top:4px}

/* filter */
.filter{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.filter input{flex:1;min-width:160px;font-size:13px;padding:7px 10px;border:1px solid var(--border);
  border-radius:6px;background:var(--surface);color:var(--ink);font-family:'DM Sans',sans-serif}
.filter select{font-size:13px;padding:7px 10px;border:1px solid var(--border);
  border-radius:6px;background:var(--surface);color:var(--ink);font-family:'DM Sans',sans-serif}

/* dosya listesi */
.dosya-list{display:flex;flex-direction:column;gap:6px}
.dosya-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:.85rem 1.1rem;display:flex;align-items:center;gap:12px;
  transition:.15s;text-decoration:none;color:inherit}
.dosya-card:hover{border-color:var(--blue);background:var(--blue-l);transform:translateX(2px)}
.dosya-ikon{font-size:1.2rem;flex-shrink:0}
.dosya-meta{flex:1;min-width:0}
.dosya-ad{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dosya-info{font-size:11px;color:var(--ink3);margin-top:3px}
.dosya-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.badge{font-size:10px;font-weight:500;padding:3px 8px;border-radius:5px}
.badge-blue{background:var(--blue-l);color:var(--blue)}
.badge-green{background:var(--green-l);color:var(--green)}
.badge-purple{background:var(--purple-l);color:var(--purple)}
.badge-amber{background:var(--amber-l);color:var(--amber)}
.badge-gray{background:var(--gray-l);color:var(--gray)}
.indir-btn{font-size:11px;padding:4px 10px;border-radius:5px;border:1px solid var(--border);
  background:var(--surface);color:var(--ink2);cursor:pointer;font-family:'DM Sans',sans-serif;
  text-decoration:none;transition:.12s;white-space:nowrap}
.indir-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue)}

/* bos */
.bos{text-align:center;padding:3rem;color:var(--ink3);font-size:14px}

/* panel */
.panel{display:none}.panel.active{display:block}

@media(max-width:640px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .stats{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="top">
  <div class="logo"><div class="logo-dot"></div><span id="okul-adi">Eğitim Asistanı</span></div>
  <div class="top-right">
    <span class="sync" id="sync-time">Güncelleniyor...</span>
    <button class="btn" onclick="veriYukle()">↺ Yenile</button>
  </div>
</div>

<div class="layout">
  <nav class="sidebar">
    <div class="nav-group">
      <div class="nav-lbl">Genel</div>
      <div class="nav-item active" onclick="sayfaGoster('tumü')">
        <span class="nav-icon">🗂</span>Tümü
        <span class="nav-badge" id="badge-tumu">0</span>
      </div>
    </div>
    <div class="nav-group">
      <div class="nav-lbl">Belgeler</div>
      <div class="nav-item" onclick="sayfaGoster('plan')">
        <span class="nav-icon">📚</span>Günlük Planlar
        <span class="nav-badge" id="badge-plan">0</span>
      </div>
      <div class="nav-item" onclick="sayfaGoster('sok')">
        <span class="nav-icon">📋</span>ŞÖK Tutanakları
        <span class="nav-badge" id="badge-sok">0</span>
      </div>
      <div class="nav-item" onclick="sayfaGoster('zumre')">
        <span class="nav-icon">📗</span>Zümre Tutanakları
        <span class="nav-badge" id="badge-zumre">0</span>
      </div>
      <div class="nav-item" onclick="sayfaGoster('veli')">
        <span class="nav-icon">👨‍👩‍👧</span>Veli Tutanakları
        <span class="nav-badge" id="badge-veli">0</span>
      </div>
      <div class="nav-item" onclick="sayfaGoster('rehberlik')">
        <span class="nav-icon">💛</span>Rehberlik Raporları
        <span class="nav-badge" id="badge-rehberlik">0</span>
      </div>
    </div>
  </nav>

  <main class="main">
    <div class="page-hdr">
      <div class="page-title" id="page-title">Tüm Belgeler</div>
      <div class="page-sub" id="page-sub">Bot tarafından otomatik üretilen tüm evraklar</div>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-n" id="s-plan">–</div><div class="stat-l">Günlük Plan</div></div>
      <div class="stat"><div class="stat-n" id="s-tut">–</div><div class="stat-l">Toplantı Tutanağı</div></div>
      <div class="stat"><div class="stat-n" id="s-reh">–</div><div class="stat-l">Rehberlik Raporu</div></div>
      <div class="stat"><div class="stat-n" id="s-top">–</div><div class="stat-l">Toplam Belge</div></div>
    </div>

    <div class="filter">
      <input type="text" id="ara" placeholder="Belge ara..." oninput="listeyiGuncelle()">
      <select id="siralama" onchange="listeyiGuncelle()">
        <option value="yeni">En Yeni</option>
        <option value="eski">En Eski</option>
        <option value="ad">Ada Göre</option>
      </select>
    </div>

    <div class="dosya-list" id="dosya-list"></div>
  </main>
</div>

<script>
let TUM_VERI = [];
let AKTIF_FILTRE = "tumü";

const BADGE_RENK = {
  gunluk_planlar: "badge-blue",
  sok:    "badge-blue",
  zumre:  "badge-green",
  veli:   "badge-purple",
  rehberlik: "badge-amber",
};
const ETIKET = {
  gunluk_planlar:"Günlük Plan",
  sok:"ŞÖK", zumre:"Zümre", veli:"Veli", rehberlik:"Rehberlik"
};

async function veriYukle() {
  document.getElementById("sync-time").textContent = "Yükleniyor...";
  try {
    const r = await fetch("dosyalar.json?t=" + Date.now());
    const d = await r.json();
    TUM_VERI = d.dosyalar || [];
    document.getElementById("okul-adi").textContent = d.okul_adi || "Eğitim Asistanı";
    document.getElementById("sync-time").textContent = "Son güncelleme: " + (d.guncellendi || "—");
    const oz = d.ozet || {};
    document.getElementById("s-plan").textContent = oz.plan ?? "–";
    document.getElementById("s-tut").textContent  = oz.tutanak ?? "–";
    document.getElementById("s-reh").textContent  = oz.rehberlik ?? "–";
    document.getElementById("s-top").textContent  = oz.toplam ?? "–";
    sayilaGuncelle();
    listeyiGuncelle();
  } catch(e) {
    document.getElementById("sync-time").textContent = "Yüklenemedi";
    document.getElementById("dosya-list").innerHTML =
      '<div class="bos">dosyalar.json bulunamadı.<br>Bot henüz çalışmamış olabilir.</div>';
  }
}

function sayilaGuncelle() {
  const sayim = {};
  TUM_VERI.forEach(d => { sayim[d.tur] = (sayim[d.tur] || 0) + 1; });
  document.getElementById("badge-tumu").textContent  = TUM_VERI.length;
  document.getElementById("badge-plan").textContent  = sayim["gunluk_planlar"] || 0;
  document.getElementById("badge-sok").textContent   = sayim["sok"] || 0;
  document.getElementById("badge-zumre").textContent = sayim["zumre"] || 0;
  document.getElementById("badge-veli").textContent  = sayim["veli"] || 0;
  document.getElementById("badge-rehberlik").textContent = sayim["rehberlik"] || 0;
}

function sayfaGoster(filtre) {
  AKTIF_FILTRE = filtre;
  document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
  event.currentTarget.classList.add("active");
  const basliklar = {
    "tumü":      ["Tüm Belgeler",          "Bot tarafından otomatik üretilen tüm evraklar"],
    "plan":      ["Günlük Planlar",         "Maarif ve Normal müfredat günlük ders planları"],
    "sok":       ["ŞÖK Tutanakları",        "Şube Öğretmenler Kurulu toplantı tutanakları"],
    "zumre":     ["Zümre Tutanakları",      "Zümre Öğretmenler Kurulu toplantı tutanakları"],
    "veli":      ["Veli Toplantı Tutanakları","Veli toplantısı tutanakları"],
    "rehberlik": ["Rehberlik Raporları",    "Aylık sınıf rehberlik raporları"],
  };
  const [baslik, alt] = basliklar[filtre] || ["Belgeler",""];
  document.getElementById("page-title").textContent = baslik;
  document.getElementById("page-sub").textContent   = alt;
  listeyiGuncelle();
}

function listeyiGuncelle() {
  const ara     = document.getElementById("ara").value.toLowerCase();
  const sira    = document.getElementById("siralama").value;
  const tur_map = { "plan":"gunluk_planlar" };
  const aranan_tur = tur_map[AKTIF_FILTRE] || AKTIF_FILTRE;

  let liste = TUM_VERI.filter(d => {
    if (AKTIF_FILTRE !== "tumü" && d.tur !== aranan_tur) return false;
    if (ara && !d.ad.toLowerCase().includes(ara)) return false;
    return true;
  });

  if (sira === "yeni") liste.sort((a,b) => b.tarih_ts - a.tarih_ts);
  else if (sira === "eski") liste.sort((a,b) => a.tarih_ts - b.tarih_ts);
  else liste.sort((a,b) => a.ad.localeCompare(b.ad, "tr"));

  const el = document.getElementById("dosya-list");
  if (!liste.length) {
    el.innerHTML = '<div class="bos">Bu kategoride henüz belge yok.</div>';
    return;
  }

  el.innerHTML = liste.map(d => {
    const badgeCls = BADGE_RENK[d.tur] || "badge-gray";
    const etiket   = ETIKET[d.tur]     || d.etiket;
    const ad_temiz = d.ad.replace(".docx","").replace(/_/g," ");
    return `
    <a class="dosya-card" href="${d.url}" download="${d.ad}">
      <span class="dosya-ikon">${d.ikon}</span>
      <div class="dosya-meta">
        <div class="dosya-ad">${ad_temiz}</div>
        <div class="dosya-info">${d.tarih} &nbsp;·&nbsp; ${d.boyut_kb} KB</div>
      </div>
      <div class="dosya-right">
        <span class="badge ${badgeCls}">${etiket}</span>
        <span class="indir-btn">⬇ İndir</span>
      </div>
    </a>`;
  }).join("");
}

veriYukle();
</script>
</body>
</html>
